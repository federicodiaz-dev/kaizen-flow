<div class="list-container glass-panel animate-slide-up stagger-2">
  <div class="list-header">
    <div class="toolbar">
      <div class="search-box">
        <input
          type="text"
          class="input-text"
          [ngModel]="searchText()"
          (ngModelChange)="searchTextChange.emit($event)"
          placeholder="Buscar id, motivo o recurso..."
        />
      </div>

      <select class="input-text filter-select" [ngModel]="statusFilter()" (ngModelChange)="statusFilterChange.emit($event)">
        <option value="all">Todos</option>
        <option value="opened">Abiertos</option>
        <option value="closed">Cerrados</option>
      </select>
    </div>
  </div>

  <div class="list-content">
    @if (loading()) {
      <div class="state-msg">Cargando bandeja de reclamos...</div>
    } @else if (error()) {
      <div class="state-msg error">{{ error() }}</div>
    } @else if (claims().length === 0) {
      <div class="state-msg">No se encontraron reclamos vigentes.</div>
    } @else {
      <div class="items-grid">
        @for (claim of claims(); track claim.id) {
          <button
            type="button"
            class="list-item"
            [class.selected]="claim.id === selectedId()"
            [class.ml-highlight]="isMLClaim(claim.type)"
            [class.buyer-highlight]="!isMLClaim(claim.type)"
            (click)="selectClaim.emit(claim.id)"
          >
            <div class="item-top">
              <span class="status-pill" [class.closed]="claim.status === 'closed'">
                {{ translateStatus(claim.status) }}
              </span>
              <span class="item-id">#{{ claim.id }}</span>
            </div>
            <h4 class="item-title">{{ translateType(claim.type) }} · {{ translateStage(claim.stage) }}</h4>
            <p class="item-meta truncate">{{ claim.reason_id || 'Motivo desconocido' }}</p>
            <div class="item-bottom">
              <span class="item-alert">{{ claim.available_actions.length }} acciones req.</span>
              <span class="item-date">{{ claim.last_updated | date: 'short' }}</span>
            </div>
          </button>
        }
      </div>
    }
  </div>
</div>
