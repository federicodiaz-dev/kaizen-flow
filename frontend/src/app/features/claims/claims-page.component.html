<section class="page-container animate-slide-up stagger-1" data-tour-id="claims-workspace">
  <header class="page-header">
    <div class="header-content">
      <h1 class="page-title">Reclamos</h1>
      <p class="page-subtitle">Seguimiento postventa y resolucion de conflictos de la cuenta {{ activeAccountLabel() }}.</p>
    </div>

    <div class="quick-stats">
      <div class="stat-item">
        <span class="stat-label">Total</span>
        <strong class="stat-value">{{ totalClaims() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Abiertos</span>
        <strong class="stat-value warning">{{ openClaims() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Con Accion</span>
        <strong class="stat-value success">{{ actionableClaims() }}</strong>
      </div>
    </div>
  </header>

  <section class="feature-layout" [class.has-selection]="!!selectedClaimId()">
    <app-claim-list
      class="list-section"
      [claims]="filteredClaims()"
      [selectedId]="selectedClaimId()"
      [loading]="loadingList()"
      [error]="listError()"
      [searchText]="searchText()"
      [statusFilter]="statusFilter()"
      [stageFilter]="stageFilter()"
      [actionFilter]="actionFilter()"
      [resultCount]="filteredCount()"
      [totalCount]="totalClaims()"
      [activeFilterCount]="activeFilterCount()"
      (searchTextChange)="searchText.set($event)"
      (statusFilterChange)="statusFilter.set($event)"
      (stageFilterChange)="stageFilter.set($event)"
      (actionFilterChange)="actionFilter.set($event)"
      (resetFilters)="resetFilters()"
      (refresh)="refreshClaims()"
      (selectClaim)="onSelectClaim($event)"
    />

    <app-claim-detail
      class="detail-section"
      data-tour-id="claims-detail-panel"
      [claim]="selectedClaim()"
      [loading]="loadingDetail()"
      [error]="detailError()"
      [sending]="sending()"
      [nextPendingMessage]="followUpMessage()"
      [hasNextPending]="!!nextPendingClaimId()"
      [clearDraftToken]="clearDraftToken()"
      (sendMessage)="onSendMessage($event)"
      (jumpToNextPending)="goToNextPendingClaim()"
      (closeDetail)="closeSelectedClaim()"
    />
  </section>
</section>
