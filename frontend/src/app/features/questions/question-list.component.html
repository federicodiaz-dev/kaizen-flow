<div class="list-container glass-panel animate-slide-up stagger-2">
  <div class="list-header">
    <div class="toolbar">
      <div class="search-box">
        <input
          type="text"
          class="input-text"
          [ngModel]="searchText()"
          (ngModelChange)="searchTextChange.emit($event)"
          placeholder="Buscar pregunta o item..."
        />
      </div>

      <select class="input-text filter-select" [ngModel]="statusFilter()" (ngModelChange)="statusFilterChange.emit($event)">
        <option value="all">Todas</option>
        <option value="unanswered">Pendientes</option>
        <option value="answered">Respondidas</option>
      </select>
    </div>
  </div>

  <div class="list-content">
    @if (loading()) {
      <div class="state-msg">Cargando bandeja...</div>
    } @else if (error()) {
      <div class="state-msg error">{{ error() }}</div>
    } @else if (questions().length === 0) {
      <div class="state-msg">Bandeja vacía. Todo al día.</div>
    } @else {
      <div class="items-grid">
        @for (question of questions(); track question.id) {
          <button
            type="button"
            class="list-item"
            [class.selected]="question.id === selectedId()"
            (click)="selectQuestion.emit(question.id)"
          >
            <div class="item-top">
              <span class="status-pill" [class.answered]="question.has_answer">
                {{ question.has_answer ? 'Respondida' : 'Pendiente' }}
              </span>
              <span class="item-id">#{{ question.id }}</span>
            </div>
            <h4 class="item-title">{{ question.text }}</h4>
            <p class="item-meta truncate">{{ question.item?.title || 'Sin publicacion' }}</p>
            <div class="item-bottom">
              <span class="item-date">{{ question.date_created | date: 'short' }}</span>
              <span class="item-user">{{ question.from_user_id || 'Usuario Anónimo' }}</span>
            </div>
          </button>
        }
      </div>
    }
  </div>
</div>
