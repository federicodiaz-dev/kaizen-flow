<section class="page-container animate-slide-up stagger-1" data-tour-id="questions-workspace">
  <header class="page-header">
    <div class="header-content">
      <h1 class="page-title">Preguntas</h1>
      <p class="page-subtitle">Gestiona y responde las consultas de tu cuenta {{ activeAccountLabel() }}.</p>
    </div>
    
    <div class="quick-stats">
      <div class="stat-item">
        <span class="stat-label">Total</span>
        <strong class="stat-value">{{ totalQuestions() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Pendientes</span>
        <strong class="stat-value warning">{{ pendingQuestions() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Respondidas</span>
        <strong class="stat-value success">{{ answeredQuestions() }}</strong>
      </div>
    </div>
  </header>

  <section class="feature-layout">
    <app-question-list
      class="list-section"
      [questions]="filteredQuestions()"
      [selectedId]="selectedQuestionId()"
      [loading]="loadingList()"
      [error]="listError()"
      [searchText]="searchText()"
      [statusFilter]="statusFilter()"
      (searchTextChange)="searchText.set($event)"
      (statusFilterChange)="statusFilter.set($event)"
      (refresh)="loadQuestions(accountContext.selectedAccount()!)"
      (selectQuestion)="onSelectQuestion($event)"
    />

    <app-question-detail
      class="detail-section"
      [question]="selectedQuestion()"
      [loading]="loadingDetail()"
      [error]="detailError()"
      [submitting]="submitting()"
      (submitAnswer)="onSubmitAnswer($event)"
    />
  </section>
</section>
