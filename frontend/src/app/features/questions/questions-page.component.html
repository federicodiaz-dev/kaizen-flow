<section class="page-container animate-slide-up stagger-1" data-tour-id="questions-workspace">
  <header class="page-header">
    <div class="header-content">
      <h1 class="page-title">Preguntas</h1>
      <p class="page-subtitle">Gestiona y responde las consultas de tu cuenta {{ activeAccountLabel() }}.</p>
    </div>

    <div class="quick-stats">
      <div class="stat-item">
        <span class="stat-label">Total</span>
        <strong class="stat-value">{{ totalQuestions() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Pendientes</span>
        <strong class="stat-value warning">{{ pendingQuestions() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Respondidas</span>
        <strong class="stat-value success">{{ answeredQuestions() }}</strong>
      </div>
    </div>
  </header>

  <section class="feature-layout" [class.has-selection]="!!selectedQuestionId()">
    <app-question-list
      class="list-section"
      [questions]="filteredQuestions()"
      [selectedId]="selectedQuestionId()"
      [loading]="loadingList()"
      [error]="listError()"
      [searchText]="searchText()"
      [statusFilter]="statusFilter()"
      [respondableFilter]="respondableFilter()"
      [sortOrder]="sortOrder()"
      [resultCount]="filteredCount()"
      [totalCount]="totalQuestions()"
      [activeFilterCount]="activeFilterCount()"
      (searchTextChange)="searchText.set($event)"
      (statusFilterChange)="statusFilter.set($event)"
      (respondableFilterChange)="onRespondableFilterChange($event)"
      (sortOrderChange)="onSortOrderChange($event)"
      (resetFilters)="resetFilters()"
      (refresh)="refreshQuestions()"
      (selectQuestion)="onSelectQuestion($event)"
    />

    <app-question-detail
      class="detail-section"
      [question]="selectedQuestion()"
      [loading]="loadingDetail()"
      [error]="detailError()"
      [submitting]="submitting()"
      [nextPendingMessage]="followUpMessage()"
      [hasNextPending]="!!nextPendingQuestionId()"
      (submitAnswer)="onSubmitAnswer($event)"
      (jumpToNextPending)="goToNextPendingQuestion()"
      (closeDetail)="closeSelectedQuestion()"
    />
  </section>
</section>
