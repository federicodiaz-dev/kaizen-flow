<section class="page-container animate-slide-up stagger-1" data-tour-id="items-workspace">
  <header class="page-header">
    <div class="header-content">
      <h1 class="page-title">Productos</h1>
      <p class="page-subtitle">Gestiona el catalogo, stock y precios de tu cuenta {{ activeAccountLabel() }}.</p>
    </div>

    <div class="quick-stats">
      <div class="stat-item">
        <span class="stat-label">Total</span>
        <strong class="stat-value">{{ totalItems() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Activos</span>
        <strong class="stat-value success">{{ activeItems() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Pausados</span>
        <strong class="stat-value warning">{{ pausedItems() }}</strong>
      </div>
    </div>
  </header>

  <section class="feature-layout" [class.has-selection]="!!selectedItemId()">
    <app-item-list
      class="list-section"
      [items]="filteredItems()"
      [selectedId]="selectedItemId()"
      [loading]="loadingList()"
      [error]="listError()"
      [searchText]="searchText()"
      [statusFilter]="statusFilter()"
      [sortOrder]="sortOrder()"
      [resultCount]="filteredCount()"
      [totalCount]="totalItems()"
      [activeFilterCount]="activeFilterCount()"
      (searchTextChange)="searchText.set($event)"
      (statusFilterChange)="onStatusFilterChange($event)"
      (sortOrderChange)="onSortOrderChange($event)"
      (resetFilters)="resetFilters()"
      (refresh)="refreshItems()"
      (selectItem)="onSelectItem($event)"
    />

    <app-item-detail
      class="detail-section"
      data-tour-id="items-detail-shell"
      [item]="selectedItem()"
      [loading]="loadingDetail()"
      [error]="detailError()"
      [saving]="saving()"
      (save)="onSave($event)"
      (closeDetail)="closeSelectedItem()"
    />
  </section>
</section>
