<section class="page-container animate-slide-up stagger-1">
  <header class="page-header">
    <div class="header-content">
      <h1 class="page-title">Productos</h1>
      <p class="page-subtitle">Gestiona el catálogo, stock y precios de tu cuenta {{ activeAccountLabel() }}.</p>
    </div>
    
    <div class="quick-stats">
      <div class="stat-item">
        <span class="stat-label">Total</span>
        <strong class="stat-value">{{ totalItems() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Activos</span>
        <strong class="stat-value success">{{ activeItems() }}</strong>
      </div>
      <div class="stat-item">
        <span class="stat-label">Pausados</span>
        <strong class="stat-value warning">{{ pausedItems() }}</strong>
      </div>
    </div>
  </header>

  <section class="feature-layout">
    <app-item-list
      class="list-section"
      [items]="filteredItems()"
      [selectedId]="selectedItemId()"
      [loading]="loadingList()"
      [error]="listError()"
      [searchText]="searchText()"
      [statusFilter]="statusFilter()"
      (searchTextChange)="searchText.set($event)"
      (statusFilterChange)="onStatusFilterChange($event)"
      (refresh)="loadItems(accountContext.selectedAccount()!)"
      (selectItem)="onSelectItem($event)"
    />

    <app-item-detail
      class="detail-section"
      [item]="selectedItem()"
      [loading]="loadingDetail()"
      [error]="detailError()"
      [saving]="saving()"
      (save)="onSave($event)"
    />
  </section>
</section>
