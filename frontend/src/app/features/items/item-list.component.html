<div class="list-container glass-panel animate-slide-up stagger-2">
  <div class="list-header">
    <div class="toolbar">
      <div class="search-box">
        <input
          type="text"
          class="input-text"
          [ngModel]="searchText()"
          (ngModelChange)="searchTextChange.emit($event)"
          placeholder="Buscar por título o ID..."
        />
      </div>

      <select class="input-text filter-select" [ngModel]="statusFilter()" (ngModelChange)="statusFilterChange.emit($event)">
        <option value="all">Todos</option>
        <option value="active">Activos</option>
        <option value="paused">Pausados</option>
        <option value="closed">Cerrados</option>
      </select>
    </div>
  </div>

  <div class="list-content">
    @if (loading()) {
      <div class="state-msg">Cargando catálogo...</div>
    } @else if (error()) {
      <div class="state-msg error">{{ error() }}</div>
    } @else if (items().length === 0) {
      <div class="state-msg">Catálogo vacío.</div>
    } @else {
      <div class="items-grid">
        @for (item of items(); track item.id) {
          <button
            type="button"
            class="list-item item-row"
            [class.selected]="item.id === selectedId()"
            (click)="selectItem.emit(item.id)"
          >
            <div class="item-visual">
              @if (item.thumbnail) {
                <img [src]="item.thumbnail" [alt]="item.title" class="thumbnail" />
              } @else {
                <div class="thumb-placeholder">{{ item.title.slice(0, 1) }}</div>
              }
            </div>
            
            <div class="item-details">
              <div class="item-top">
                <span class="status-pill" [class.paused]="item.status === 'paused'">
                  {{ item.status || 'Estado N/D' }}
                </span>
                <span class="item-id">{{ item.id }}</span>
              </div>
              <h4 class="item-title">{{ item.title }}</h4>
              <div class="item-bottom">
                <span class="item-price">{{ item.price | currency: item.currency_id || 'ARS' }}</span>
                <span class="item-date">Stock: {{ item.available_quantity ?? 'N/D' }}</span>
              </div>
            </div>
          </button>
        }
      </div>
    }
  </div>
</div>
