<div class="app-shell">
  <button class="theme-toggle" (click)="toggleTheme()" [class.dark]="isDarkMode()" title="Cambiar a Modo Oscuro/Claro">
    <span class="icon"></span>
  </button>

  <aside class="sidebar animate-slide-up stagger-1">
    <div class="brand-shell">
      <div class="icon-logo">KF</div>
      <div class="brand">
        <h1>Kaizen Flow</h1>
        <div class="brand-subtitle">Mercado Libre workspace</div>
      </div>
    </div>

    <div class="account-selector">
      <div class="selector-header">
        <span class="label">Workspace activo</span>
        <span class="status-dot"></span>
      </div>
      
      <select
        class="minimal-select"
        [disabled]="accountContext.loading() || accountContext.accounts().length === 0"
        [ngModel]="accountContext.selectedAccount()"
        (ngModelChange)="onAccountChange($event)"
      >
        @for (account of accountContext.accounts(); track account.key) {
          <option [value]="account.key">{{ account.label }} ({{ account.key }})</option>
        }
      </select>
      
      @if (accountContext.loading()) {
        <p class="status-msg">Cargando...</p>
      }
      @if (accountContext.error()) {
        <p class="status-msg error">{{ accountContext.error() }}</p>
      }
    </div>

    <nav class="nav-links">
      <a routerLink="/questions" routerLinkActive="active">
        <span class="nav-icon">Q</span>
        <span class="nav-copy">Preguntas</span>
      </a>
      <a routerLink="/claims" routerLinkActive="active">
        <span class="nav-icon">C</span>
        <span class="nav-copy">Reclamos</span>
      </a>
      <a routerLink="/items" routerLinkActive="active">
        <span class="nav-icon">P</span>
        <span class="nav-copy">Productos</span>
      </a>
    </nav>
  </aside>

  <main class="page-content animate-slide-up stagger-2">
    <router-outlet />
  </main>
</div>
