@if (tour.running() && tour.currentStep(); as step) {
  <div class="tour-shell" aria-live="polite" aria-label="Introducción guiada de Kaizen Flow">
    <div class="tour-shell__veil"></div>

    @if (spotlightRect(); as rect) {
      <div
        class="tour-shell__spotlight"
        [style.top.px]="rect.top"
        [style.left.px]="rect.left"
        [style.width.px]="rect.width"
        [style.height.px]="rect.height"
      ></div>
    }

    <aside class="tour-card" [ngStyle]="cardStyle()">
      <div class="tour-card__header">
        <span class="tour-card__progress">{{ tour.progressLabel() }}</span>
        <button type="button" class="tour-card__skip" (click)="tour.skip()">Omitir</button>
      </div>

      <div class="tour-card__body">
        <h3>{{ step.title }}</h3>
        <p>{{ step.description }}</p>
      </div>

      <div class="tour-card__footer">
        <span class="tour-card__steps">Paso {{ tour.progressLabel() }}</span>
        <button type="button" class="tour-card__next" (click)="tour.next()">
          {{ tour.isLastStep() ? 'Finalizar' : 'Siguiente' }}
        </button>
      </div>
    </aside>
  </div>
}
